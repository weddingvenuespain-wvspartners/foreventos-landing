<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <!-- stroke 16, trazo via currentColor; dot color passed per-instance through a CSS var fallback -->
    <g id="strokes" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
      <path d="M72 198 V112 A48 48 0 0 1 168 112 V198"/>
      <path d="M72 128 H92"/>
      <path d="M168 128 H148"/>
      <path d="M168 198 H102"/>
    </g>
  </defs>

  <rect width="1320" height="900" fill="#FFFFFF"/>
  <text x="80" y="58" font-size="30" font-weight="700" fill="#1A2419">Color del punto — tokens reales de :root</text>
  <text x="80" y="88" font-size="16" fill="#8A9489">trazo #1A2419 · trazo 16 · #7BD89B no es token (solo inline en page.html)</text>

  <!-- option 1: accent 8FAA94 -->
  <rect x="80" y="120" width="220" height="220" rx="48" fill="#F5F4EE"/>
  <g transform="translate(70,110) scale(0.92)"><use href="#strokes" color="#1A2419"/><circle cx="120" cy="128" r="9" fill="#8FAA94"/></g>
  <text x="120" y="368" font-size="15" font-weight="700" fill="#1A2419">--accent</text>
  <text x="120" y="388" font-size="14" fill="#8A9489">#8FAA94 (sage)</text>

  <!-- option 2: accent-soft B8C9B9 -->
  <rect x="340" y="120" width="220" height="220" rx="48" fill="#F5F4EE"/>
  <g transform="translate(330,110) scale(0.92)"><use href="#strokes" color="#1A2419"/><circle cx="120" cy="128" r="9" fill="#B8C9B9"/></g>
  <text x="380" y="368" font-size="15" font-weight="700" fill="#1A2419">--accent-soft</text>
  <text x="380" y="388" font-size="14" fill="#8A9489">#B8C9B9</text>

  <!-- option 3: pill green #7BD89B -->
  <rect x="600" y="120" width="220" height="220" rx="48" fill="#F5F4EE"/>
  <g transform="translate(590,110) scale(0.92)"><use href="#strokes" color="#1A2419"/><circle cx="120" cy="128" r="9" fill="#7BD89B"/></g>
  <text x="640" y="368" font-size="15" font-weight="700" fill="#1A2419">pill (inline)</text>
  <text x="640" y="388" font-size="14" fill="#8A9489">#7BD89B</text>

  <!-- option 4: warm gold D4C29E -->
  <rect x="860" y="120" width="220" height="220" rx="48" fill="#F5F4EE"/>
  <g transform="translate(850,110) scale(0.92)"><use href="#strokes" color="#1A2419"/><circle cx="120" cy="128" r="9" fill="#D4C29E"/></g>
  <text x="900" y="368" font-size="15" font-weight="700" fill="#1A2419">--warm</text>
  <text x="900" y="388" font-size="14" fill="#8A9489">#D4C29E (oro)</text>

  <!-- same four on dark bg to compare contrast -->
  <text x="80" y="450" font-size="18" font-weight="700" fill="#1A2419">sobre fondo oscuro (--bg #141E16)</text>
  <rect x="80" y="465" width="220" height="160" rx="36" fill="#141E16"/>
  <g transform="translate(110,455) scale(0.62)"><use href="#strokes" color="#F5F4EE"/><circle cx="120" cy="128" r="9" fill="#8FAA94"/></g>
  <rect x="340" y="465" width="220" height="160" rx="36" fill="#141E16"/>
  <g transform="translate(370,455) scale(0.62)"><use href="#strokes" color="#F5F4EE"/><circle cx="120" cy="128" r="9" fill="#B8C9B9"/></g>
  <rect x="600" y="465" width="220" height="160" rx="36" fill="#141E16"/>
  <g transform="translate(630,455) scale(0.62)"><use href="#strokes" color="#F5F4EE"/><circle cx="120" cy="128" r="9" fill="#7BD89B"/></g>
  <rect x="860" y="465" width="220" height="160" rx="36" fill="#141E16"/>
  <g transform="translate(890,455) scale(0.62)"><use href="#strokes" color="#F5F4EE"/><circle cx="120" cy="128" r="9" fill="#D4C29E"/></g>

  <!-- lockup semibold airy (chosen), accent dot -->
  <text x="80" y="700" font-size="18" font-weight="700" fill="#1A2419">Lockup elegido — semibold aireado · punto --accent</text>
  <g transform="translate(80,710) scale(0.46)"><use href="#strokes" color="#1A2419"/><circle cx="120" cy="128" r="9" fill="#8FAA94"/></g>
  <text x="205" y="792" font-size="48" font-weight="600" letter-spacing="6" fill="#1A2419">FOREVENTOS</text>

  <rect x="60" y="820" width="1180" height="60" rx="0" fill="#FFFFFF"/>
</svg>
